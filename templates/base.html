<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VidSnapAI{% endblock %}</title>

    <!-- Google Fonts: Inter (premium SaaS typography) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- AOS – Animate On Scroll -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    <!-- ───────────────────────── NAVBAR ───────────────────────── -->
    <nav class="navbar navbar-expand-lg navbar-premium" id="mainNavbar">
        <div class="container">
            <!-- Brand -->
            <a class="navbar-brand brand-logo" href="/">
                <span class="brand-icon"><i class="fas fa-film"></i></span>
                <span class="brand-text">VidSnap<span class="brand-accent">AI</span></span>
            </a>

            <!-- Mobile toggler -->
            <button class="navbar-toggler custom-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span></span><span></span><span></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link nav-link-premium" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-premium" href="/features">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-premium" href="/create">Create Reel</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-premium" href="/gallery">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link nav-link-premium" href="/about">About</a>
                    </li>
                    <!-- Theme toggle -->
                    <li class="nav-item ms-lg-2">
                        <button class="btn theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle theme">
                            <i id="theme-icon" class="fas fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ───────────────────────── CONTENT ───────────────────────── -->
    <div class="main-content page-transition">
        {% block content %}{% endblock %}
    </div>

    <!-- ───────────────────────── FOOTER ───────────────────────── -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <span class="brand-icon"><i class="fas fa-film"></i></span>
                    <span class="brand-text">VidSnap<span class="brand-accent">AI</span></span>
                </div>
                <div class="footer-copy">
                    &copy; 2025 VidSnapAI &mdash; Built with <i class="fas fa-heart" style="color:#ff0000;"></i> by Piyush
                </div>
                <div class="social-links">
                    <a href="https://www.instagram.com/my.life_24143/" target="_blank" aria-label="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://www.linkedin.com/in/piyu24" target="_blank" aria-label="LinkedIn">
                        <i class="fab fa-linkedin"></i>
                    </a>
                    <a href="https://github.com/Piyu242005" target="_blank" aria-label="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/notifications.js') }}"></script>
    <script src="{{ url_for('static', filename='js/shortcuts.js') }}"></script>

    <script>
    // Init AOS
    AOS.init({ duration: 700, once: true, offset: 60 });

    // Active nav link highlight
    (function () {
        const path = window.location.pathname;
        document.querySelectorAll('.nav-link-premium').forEach(link => {
            const href = link.getAttribute('href');
            const isActive = (href === '/' && path === '/') ||
                             (href !== '/' && path.startsWith(href));
            if (isActive) link.classList.add('active');
        });
    })();

    // Sticky navbar shadow on scroll
    window.addEventListener('scroll', function () {
        const navbar = document.getElementById('mainNavbar');
        if (window.scrollY > 20) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    });
    </script>

    {% block extra_js %}{% endblock %}
</body>

</html>
